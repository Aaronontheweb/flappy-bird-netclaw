<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird Clone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  canvas {
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ─── Setup ────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = canvas.width  = 400;
const H = canvas.height = 600;

// ─── Audio (Web Audio API beeps) ─────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, duration, type = 'square', vol = 0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxFlap()  { playTone(440, 0.1, 'sine', 0.08); }
function sfxScore() { playTone(660, 0.1, 'sine', 0.1); setTimeout(() => playTone(880, 0.15, 'sine', 0.1), 80); }
function sfxHit()   { playTone(180, 0.3, 'sawtooth', 0.12); }

// ─── Game State ───────────────────────────────────────
let state = 'menu'; // 'menu' | 'play' | 'dead'
let score = 0;
let bestScore = parseInt(localStorage.getItem('flappyBest') || '0');
let frameCount = 0;
let groundX = 0;

// ─── Bird ─────────────────────────────────────────────
const bird = {
  x: 80,
  y: H / 2,
  w: 34,
  h: 26,
  vy: 0,
  gravity: 0.45,
  flapForce: -7.5,
  rotation: 0,
  frame: 0,
  frameTimer: 0,

  reset() {
    this.y = H / 2;
    this.vy = 0;
    this.rotation = 0;
    this.frame = 0;
  },

  flap() {
    this.vy = this.flapForce;
    sfxFlap();
  },

  update() {
    if (state === 'play') {
      this.vy += this.gravity;
      this.y += this.vy;
      this.rotation = Math.min(Math.max(this.vy * 0.08, -0.5), 1.5);
    } else if (state === 'menu') {
      this.y = H / 2 + Math.sin(frameCount * 0.06) * 12;
      this.rotation = 0;
    }
    this.frameTimer++;
    if (this.frameTimer > 6) {
      this.frame = (this.frame + 1) % 3;
      this.frameTimer = 0;
    }
  },

  draw() {
    ctx.save();
    ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
    ctx.rotate(this.rotation);

    const bx = -this.w / 2, by = -this.h / 2;
    const bw = this.w, bh = this.h;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(2, 3, bw / 2, bh / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Main body gradient
    const grad = ctx.createRadialGradient(-2, -2, 2, 0, 0, bw / 2);
    grad.addColorStop(0, '#FFD700');
    grad.addColorStop(1, '#FF8C00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, bw / 2, bh / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#CC6600';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Wing
    const wingY = [-2, -5, -2][this.frame];
    ctx.fillStyle = '#FFE066';
    ctx.strokeStyle = '#CC8800';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(-4, wingY, 10, 6, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Eye (white)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(8, -5, 6, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Pupil
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(10, -4, 3, 0, Math.PI * 2);
    ctx.fill();

    // Pupil highlight
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(11, -6, 1.2, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#FF4444';
    ctx.beginPath();
    ctx.moveTo(12, 0);
    ctx.lineTo(22, 2);
    ctx.lineTo(12, 5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#CC2222';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  }
};

// ─── Pipes ────────────────────────────────────────────
const GAP = 145;
const PIPE_W = 56;
const PIPE_SPEED = 2.8;
let pipes = [];
let pipeTimer = 0;
const PIPE_INTERVAL = 95;

function spawnPipe() {
  const minY = 80;
  const maxY = H - 160 - GAP;
  const topH = minY + Math.random() * (maxY - minY);
  pipes.push({ x: W + 10, topH, scored: false });
}

function drawPipe(p) {
  const capH = 26;
  const capOverhang = 5;
  const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  grad.addColorStop(0, '#5CBF2A');
  grad.addColorStop(0.3, '#73D644');
  grad.addColorStop(0.7, '#5CBF2A');
  grad.addColorStop(1, '#3D8C1C');

  // Top body
  ctx.fillStyle = grad;
  ctx.fillRect(p.x, 0, PIPE_W, p.topH);
  // Top cap
  ctx.fillStyle = grad;
  ctx.fillRect(p.x - capOverhang, p.topH - capH, PIPE_W + capOverhang * 2, capH);
  ctx.strokeStyle = '#2D6B10';
  ctx.lineWidth = 2;
  ctx.strokeRect(p.x, 0, PIPE_W, p.topH);
  ctx.strokeRect(p.x - capOverhang, p.topH - capH, PIPE_W + capOverhang * 2, capH);

  // Bottom body
  const botY = p.topH + GAP;
  ctx.fillStyle = grad;
  ctx.fillRect(p.x, botY, PIPE_W, H - botY - 80);
  // Bottom cap
  ctx.fillRect(p.x - capOverhang, botY, PIPE_W + capOverhang * 2, capH);
  ctx.strokeRect(p.x, botY, PIPE_W, H - botY - 80);
  ctx.strokeRect(p.x - capOverhang, botY, PIPE_W + capOverhang * 2, capH);
}

// ─── Background ───────────────────────────────────────
const clouds = [];
for (let i = 0; i < 6; i++) {
  clouds.push({ x: Math.random() * W, y: 30 + Math.random() * 150, w: 60 + Math.random() * 80, speed: 0.2 + Math.random() * 0.3 });
}
const stars = [];
for (let i = 0; i < 30; i++) {
  stars.push({ x: Math.random() * W, y: Math.random() * (H - 200), r: 0.5 + Math.random() * 1.5, twinkle: Math.random() * Math.PI * 2 });
}

function drawBackground() {
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H - 80);
  skyGrad.addColorStop(0, '#1a1a3e');
  skyGrad.addColorStop(0.4, '#2d4a7a');
  skyGrad.addColorStop(0.7, '#5a9fd4');
  skyGrad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H - 80);

  // Stars
  stars.forEach(s => {
    s.twinkle += 0.03;
    const alpha = 0.3 + 0.7 * Math.abs(Math.sin(s.twinkle));
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  clouds.forEach(c => {
    if (state === 'play') c.x -= c.speed;
    if (c.x + c.w < 0) c.x = W + 20;
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w / 2, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x - c.w * 0.2, c.y + 5, c.w * 0.3, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w * 0.25, c.y + 3, c.w * 0.25, 12, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  // City silhouette
  ctx.fillStyle = '#1a3a2a';
  const buildings = [
    [0, 40], [20, 60], [35, 35], [50, 70], [65, 45], [80, 55],
    [100, 80], [115, 50], [130, 65], [150, 40], [165, 75], [180, 50],
    [195, 60], [210, 45], [225, 70], [240, 55], [255, 40], [270, 65],
    [285, 50], [300, 75], [315, 45], [330, 60], [345, 55], [360, 40], [380, 50]
  ];
  buildings.forEach(([bx, bh]) => ctx.fillRect(bx, H - 80 - bh, 18, bh));

  // Lit windows
  ctx.fillStyle = 'rgba(255, 220, 100, 0.5)';
  buildings.forEach(([bx, bh]) => {
    for (let wy = H - 80 - bh + 8; wy < H - 88; wy += 12) {
      for (let wx = bx + 4; wx < bx + 14; wx += 6) {
        if (Math.random() > 0.3) ctx.fillRect(wx, wy, 3, 4);
      }
    }
  });
}

function drawGround() {
  const groundY = H - 80;
  const dirtGrad = ctx.createLinearGradient(0, groundY, 0, H);
  dirtGrad.addColorStop(0, '#C4A44E');
  dirtGrad.addColorStop(0.15, '#B8943E');
  dirtGrad.addColorStop(1, '#8B7332');
  ctx.fillStyle = dirtGrad;
  ctx.fillRect(0, groundY, W, 80);

  ctx.fillStyle = '#5CBF2A';
  ctx.fillRect(0, groundY, W, 8);

  ctx.fillStyle = '#4DA820';
  for (let x = (groundX % 24) - 24; x < W; x += 24) {
    ctx.beginPath();
    ctx.moveTo(x, groundY + 8);
    ctx.lineTo(x + 12, groundY + 2);
    ctx.lineTo(x + 24, groundY + 8);
    ctx.fill();
  }

  ctx.strokeStyle = '#3D8C1C';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();

  if (state === 'play') groundX += PIPE_SPEED;
}

// ─── Particles ────────────────────────────────────────
let particles = [];

function spawnScoreParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      life: 1,
      color: `hsl(${45 + Math.random() * 30}, 100%, ${50 + Math.random() * 30}%)`
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.025;
    return p.life > 0;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ─── Collision ────────────────────────────────────────
function checkCollision() {
  const bx = bird.x + 4, by = bird.y + 4;
  const bw = bird.w - 8, bh = bird.h - 8;
  if (by + bh >= H - 80 || by <= 0) return true;
  for (const p of pipes) {
    if (bx + bw > p.x && bx < p.x + PIPE_W && by < p.topH) return true;
    const botY = p.topH + GAP;
    if (bx + bw > p.x && bx < p.x + PIPE_W && by + bh > botY) return true;
  }
  return false;
}

// ─── Screen Shake ─────────────────────────────────────
let shakeX = 0, shakeY = 0, shakeTime = 0;
function triggerShake() { shakeTime = 15; }
function updateShake() {
  if (shakeTime > 0) {
    shakeX = (Math.random() - 0.5) * shakeTime * 0.8;
    shakeY = (Math.random() - 0.5) * shakeTime * 0.8;
    shakeTime--;
  } else { shakeX = shakeY = 0; }
}

// ─── UI Drawing ───────────────────────────────────────
function drawScore() {
  ctx.save();
  ctx.font = 'bold 52px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#333';
  ctx.fillStyle = '#fff';
  ctx.strokeText(score, W / 2, 70);
  ctx.fillText(score, W / 2, 70);
  ctx.restore();
}

function drawMenu() {
  ctx.save();
  ctx.font = 'bold 48px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  const titleY = 140 + Math.sin(frameCount * 0.04) * 5;

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText('Flappy Bird', W / 2 + 3, titleY + 3);

  const titleGrad = ctx.createLinearGradient(W / 2 - 100, titleY - 30, W / 2 + 100, titleY + 10);
  titleGrad.addColorStop(0, '#FFD700');
  titleGrad.addColorStop(0.5, '#FF8C00');
  titleGrad.addColorStop(1, '#FF4500');
  ctx.fillStyle = titleGrad;
  ctx.lineWidth = 5;
  ctx.strokeStyle = '#8B4513';
  ctx.strokeText('Flappy Bird', W / 2, titleY);
  ctx.fillText('Flappy Bird', W / 2, titleY);

  ctx.font = '20px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.5 + 0.5 * Math.sin(frameCount * 0.08);
  ctx.fillText('Press Space or Click to Start', W / 2, H / 2 + 80);
  ctx.globalAlpha = 1;

  if (bestScore > 0) {
    ctx.font = '18px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`Best: ${bestScore}`, W / 2, H / 2 + 115);
  }
  ctx.restore();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  const panelW = 260, panelH = 200;
  const px = (W - panelW) / 2, py = (H - panelH) / 2 - 30;

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, px + 4, py + 4, panelW, panelH, 16, true, false);

  const panelGrad = ctx.createLinearGradient(px, py, px, py + panelH);
  panelGrad.addColorStop(0, '#FFF8DC');
  panelGrad.addColorStop(1, '#DEB887');
  ctx.fillStyle = panelGrad;
  roundRect(ctx, px, py, panelW, panelH, 16, true, false);
  ctx.strokeStyle = '#8B7355';
  ctx.lineWidth = 3;
  roundRect(ctx, px, py, panelW, panelH, 16, false, true);

  ctx.save();
  ctx.font = 'bold 34px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8B0000';
  ctx.fillText('Game Over', W / 2, py + 42);

  ctx.font = '20px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#333';
  ctx.fillText(`Score: ${score}`, W / 2, py + 85);

  ctx.fillStyle = '#FF8C00';
  ctx.fillText(`Best: ${bestScore}`, W / 2, py + 115);

  if (score === bestScore && score > 0) {
    ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = '#FF4500';
    ctx.fillText('★ NEW BEST! ★', W / 2, py + 145);
  }

  ctx.font = '16px "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#555';
  ctx.globalAlpha = 0.5 + 0.5 * Math.sin(frameCount * 0.08);
  ctx.fillText('Press Space or Click', W / 2, py + panelH - 18);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

// ─── Input ────────────────────────────────────────────
function handleInput() {
  audioCtx.resume();
  if (state === 'menu') {
    state = 'play';
    bird.reset();
    pipes = []; pipeTimer = 0; score = 0; particles = [];
    bird.flap();
  } else if (state === 'play') {
    bird.flap();
  } else if (state === 'dead') {
    state = 'menu';
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleInput(); }
});
canvas.addEventListener('mousedown', e => { e.preventDefault(); handleInput(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(); }, { passive: false });

// ─── Main Loop ────────────────────────────────────────
function update() {
  frameCount++;
  bird.update();

  if (state === 'play') {
    pipeTimer++;
    if (pipeTimer >= PIPE_INTERVAL) { spawnPipe(); pipeTimer = 0; }

    for (let i = pipes.length - 1; i >= 0; i--) {
      pipes[i].x -= PIPE_SPEED;
      if (!pipes[i].scored && pipes[i].x + PIPE_W < bird.x) {
        pipes[i].scored = true;
        score++;
        sfxScore();
        spawnScoreParticles(bird.x, bird.y);
      }
      if (pipes[i].x + PIPE_W < -10) pipes.splice(i, 1);
    }

    if (checkCollision()) {
      state = 'dead';
      sfxHit();
      triggerShake();
      if (score > bestScore) { bestScore = score; localStorage.setItem('flappyBest', bestScore.toString()); }
    }
  }

  updateParticles();
  updateShake();
}

function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBackground();
  pipes.forEach(drawPipe);
  drawGround();
  bird.draw();
  drawParticles();

  if (state === 'play') drawScore();
  if (state === 'menu') drawMenu();
  if (state === 'dead') { drawScore(); drawGameOver(); }

  ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
</body>
</html>
